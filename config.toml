[general]
theme = "dark"
overlay_opacity = 0.6
overlay_position = "top-right"
overlay_width = 420
overlay_height = 600

[audio]
source = "auto"
sample_rate = 16000
vad_threshold = 0.5
silence_duration_ms = 1500

[transcription]
engine = "faster-whisper"
model = "small.en"
language = "en"
device = "cpu"
compute_type = "int8"
gpu_device_index = 0

[ai]
# Set your API key here for 3x faster responses (skip CLI overhead)
# Or export ANTHROPIC_API_KEY=sk-ant-... in your shell
anthropic_api_key = ""
default_provider = "claude"
vision_provider = "claude"
code_provider = "codex"
general_provider = "gemini"
context_window_minutes = 10
resume_profile = "sde"

# Which monitor to show the overlay on (1=portrait DP-1, 2=MSI DP-4)
# Put overlay on the monitor you're NOT sharing
overlay_monitor = 1

[screenshot]
capture_monitor = 2
save_path = "/tmp/meetai_screenshot.png"

[hotkeys]
screenshot_analyze = "<alt>+/"
toggle_recording = "<alt>+r"
ask_ai = "<alt>+a"
toggle_overlay = "<alt>+h"
quit = "<alt>+q"
